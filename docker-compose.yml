version: "3.8"

services:

  auth-service:
    build: ./auth-service
    container_name: auth-service
    volumes:
      - ./certs:/app/certs
    ports:
      - "8001:8000"
    environment:
      - KEY_SIZE=${KEY_SIZE:-mldsa44}
    networks:
      - micro-net

  user-service:
    build: ./user-service
    container_name: user-service
    volumes:
      - ./certs:/app/certs
    ports:
      - "8002:8000"
    environment:
      - KEY_SIZE=${KEY_SIZE:-mldsa44}
      - REPLAY_PROTECTION=OFF
    networks:
      - micro-net

  gateway:
    image: nginx:latest
    container_name: gateway
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "8080:80"
    depends_on:
      - auth-service
      - user-service
    networks:
      - micro-net

networks:
  micro-net:
    driver: bridge